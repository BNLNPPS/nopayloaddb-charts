apiVersion: v1
kind: Service
metadata:
  name: b2testpsql-replica-headless
  namespace: belle2-cdb
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: b2testpsql-replica
---
apiVersion: v1
kind: Service
metadata:
  name: b2testpsql-replica
  namespace: belle2-cdb
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: b2testpsql-replica
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: b2testpsql-replica
  namespace: belle2-cdb
spec:
  serviceName: b2testpsql-replica-headless
  replicas: 1
  selector:
    matchLabels:
      app: b2testpsql-replica
  template:
    metadata:
      labels:
        app: b2testpsql-replica
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: seed-from-primary
          image: registry.redhat.io/rhel9/postgresql-15
          command:
            - /bin/bash
            - -ec
            - |
              if [ -s /var/lib/pgsql/data/PG_VERSION ]; then
                exit 0
              fi
              rm -rf /var/lib/pgsql/data/*
              PGPASSWORD="${POSTGRESQL_PASSWORD}" pg_basebackup \
                -h b2testpsql-primary.belle2-cdb.svc.cluster.local \
                -U "${POSTGRESQL_USER}" \
                -D /var/lib/pgsql/data \
                --wal-method=stream \
                --checkpoint=fast
              touch /var/lib/pgsql/data/standby.signal
              chmod 700 /var/lib/pgsql/data
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRESQL_DATABASE
              value: conditions
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: b2testpsql-credentials
                  key: password
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
