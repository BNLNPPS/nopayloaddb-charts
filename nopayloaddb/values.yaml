#OKD project
domain: domain
project: project_name
appname: application_name
#DB parameters
dbhost: dbhost
dbname: dbname
dbuser: dbuser
dbpassword: dbpassword
#django
django_logpath: /mnt/current_logfiles
nginx_logpath: /mnt/current_logfiles
pgbouncer_logpath: /mnt/current_logfiles
#PersistentVolumeClaims
pvcname: pvcname
#Docker
django_docker_image: image
pgbouncer_docker_image: image
django_docker_image_tag: tag
pgbouncer_docker_image_tag: tag

# EXPLAIN collector cron job
explain_collector:
  enabled: false
  schedule: "*/1 * * * *"
  db_alias: read_db_1
  # If empty, django_docker_image is used
  image: ""
  # Optional dedicated read replica host; falls back to dbhost when unset
  read_host: ""
